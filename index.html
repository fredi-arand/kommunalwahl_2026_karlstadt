<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kommunalwahl Karlstadt</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <!-- Chart.js data labels plugin -->
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

    <style>
        /* Neutral, high-contrast theme */
        body {
            background-color: #f3f4f6;
            color: #111827;
        }

        body.high-contrast {
            background-color: #000;
            color: #fff;
            font-size: 112.5%;
            line-height: 1.6;
        }

        body.high-contrast .sticky-header,
        body.high-contrast main>div,
        body.high-contrast .bg-white,
        body.high-contrast .bg-gray-100 {
            background-color: #000 !important;
            color: #fff !important;
            border-color: #fff !important;
            box-shadow: none !important;
        }

        body.high-contrast .text-gray-900,
        body.high-contrast .text-gray-800,
        body.high-contrast .text-gray-700,
        body.high-contrast .text-gray-600,
        body.high-contrast .text-gray-500,
        body.high-contrast .text-gray-400,
        body.high-contrast .text-xs,
        body.high-contrast .text-sm,
        body.high-contrast .text-lg,
        body.high-contrast .text-xl,
        body.high-contrast .text-2xl {
            color: #fff !important;
        }

        body.high-contrast .text-xs {
            font-size: 1rem !important;
            line-height: 1.5rem !important;
        }

        body.high-contrast .text-sm {
            font-size: 1.125rem !important;
            line-height: 1.75rem !important;
        }

        body.high-contrast .text-lg {
            font-size: 1.375rem !important;
            line-height: 1.9rem !important;
        }

        body.high-contrast .text-xl {
            font-size: 1.6rem !important;
            line-height: 2.1rem !important;
        }

        body.high-contrast .text-2xl {
            font-size: 2.1rem !important;
            line-height: 2.4rem !important;
        }

        body.high-contrast .border,
        body.high-contrast .border-2,
        body.high-contrast .border-l-4,
        body.high-contrast .border-gray-200,
        body.high-contrast .border-gray-300,
        body.high-contrast .border-gray-800 {
            border-color: #fff !important;
        }

        body.high-contrast a {
            color: #fff !important;
        }

        body.high-contrast button {
            color: #fff !important;
            background-color: #000 !important;
            border-color: #fff !important;
        }

        .touch-target {
            min-height: 44px;
        }

        [x-cloak] {
            display: none !important;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
        }

        body.high-contrast .counted-areas-sticky {
            background-color: #000 !important;
            color: #fff !important;
            border-color: #fff !important;
            box-shadow: none !important;
        }
    </style>
</head>

<body class="antialiased" x-data="electionDashboard()" x-init="init()">

    <!-- Sticky Header & Filter Bar -->
    <header class="sticky-header bg-white shadow-md p-4">
        <h1 class="text-xl font-bold text-center mb-3 text-gray-800">Kommunalwahl Karlstadt <span
                x-text="year ? year : ''"></span></h1>

        <!-- View mode toggles -->
        <div class="flex justify-center gap-2 mb-2">
            <button @click="viewMode='mayor'; filtersOpen = false"
                :class="viewMode==='mayor'? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-700'"
                class="touch-target px-4 py-2 rounded-full font-semibold border-2 transition">Bürgermeister</button>
            <button @click="viewMode='candidates'"
                :class="viewMode==='candidates'? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-700'"
                class="touch-target px-4 py-2 rounded-full font-semibold border-2 transition">Kandidaten</button>
        </div>

        <div x-show="displayCountedAreas" class="flex justify-center mb-2" x-cloak>
            <div class="text-center">
                <div
                    class="counted-areas-sticky bg-gray-800 text-white text-xs font-semibold px-3 py-1.5 rounded-full border border-gray-700 shadow-sm">
                    Ausgezählte Gebiete: <span x-text="displayCountedAreas"></span>
                </div>
                <div x-show="isDebugMode && countedAreasSourceLabel" class="mt-1 text-[11px] text-gray-500"
                    x-text="countedAreasSourceLabel"></div>
            </div>
        </div>

        <div x-show="timestamp" class="mt-1 transition-all duration-200 ease-out overflow-hidden"
            :class="standRowVisible ? 'max-h-96 opacity-100 translate-y-0' : 'max-h-0 opacity-0 -translate-y-1 pointer-events-none'">
            <div class="flex items-center gap-2 justify-start">
                <button @click="toggleUpdateHistory()"
                    :class="showUpdateHistory ? 'bg-gray-800 text-white border-gray-800' : 'bg-gray-100 text-gray-600 border-gray-200'"
                    class="touch-target px-3 py-1.5 rounded-lg text-sm font-semibold border text-left transition"
                    x-text="'Stand: ' + timestamp"></button>
                <button x-show="viewMode==='candidates'" @click="toggleFilters()"
                    :aria-expanded="filtersOpen.toString()" id="filter-toggle"
                    :class="filtersOpen ? 'bg-gray-800 text-white border-gray-800' : 'bg-gray-100 text-gray-600 border-gray-200'"
                    class="touch-target px-3 py-1.5 rounded-lg text-sm font-semibold border flex items-center gap-1 transition">
                    <span>Filter</span>
                    <span x-show="selectedParties.length > 0" class="text-xs rounded-full px-1.5 py-0.5"
                        :class="filtersOpen ? 'bg-white text-gray-800' : 'bg-gray-700 text-white'"
                        x-text="selectedParties.length"></span>
                </button>
            </div>
            <div x-show="showUpdateHistory" class="mt-1 text-xs text-gray-500">
                <template x-if="actualUpdateTimestamps.length > 0">
                    <div>
                        <p class="mb-1">Änderungen erkannt um:</p>
                        <template x-for="entry in actualUpdateTimestamps" :key="entry">
                            <p x-text="entry"></p>
                        </template>
                    </div>
                </template>
                <template x-if="actualUpdateTimestamps.length === 0">
                    <p>Noch keine Änderungen erkannt.</p>
                </template>
            </div>

            <!-- Party Filter (collapsible, only in candidates view) -->
            <div x-show="viewMode==='candidates' && filtersOpen"
                class="mt-2 bg-gray-100 rounded-lg border border-gray-200">
                <div role="region" aria-labelledby="filter-toggle" class="flex flex-wrap gap-2 px-3 py-3">
                    <template x-for="party in parties" :key="party.id">
                        <button @click="toggleParty(party.id)"
                            class="touch-target px-4 py-2 rounded-full font-semibold border-2 transition whitespace-nowrap"
                            :class="selectedParties.includes(party.id) ? 'text-white' : 'bg-white text-gray-700 border-gray-300'"
                            :style="selectedParties.includes(party.id) ? `background-color: ${party.color}; border-color: ${party.color};` : ''"
                            x-text="party.name"></button>
                    </template>
                    <button @click="resetFilters()"
                        class="ml-auto px-3 py-1 rounded-lg bg-gray-200 text-sm self-center">Filter
                        zurücksetzen</button>
                </div>
            </div>
        </div>

    </header>

    <main class="p-4">

        <!-- Timestamp (non-sticky, top of scrollable content) -->
        <!-- Party Strength Chart -->
        <div x-show="viewMode==='candidates'" class="bg-white rounded-xl shadow-sm p-4 mb-6">
            <h2 class="text-lg font-bold mb-2 text-gray-700">Sitzverteilung</h2>
            <div class="w-full relative" style="height: 180px;">
                <canvas id="partyChart"></canvas>
            </div>
        </div>

        <!-- Candidates / Mayor Lists -->
        <div>
            <h2 class="text-lg font-bold mb-4 text-gray-700">
                <template x-if="viewMode==='candidates'">Kandidaten <span class="text-sm font-normal text-gray-500"
                        x-text="`(${filteredCandidates.length})`"></span></template>
                <template x-if="viewMode==='mayor'">Bürgermeisterkandidaten <span
                        class="text-sm font-normal text-gray-500"
                        x-text="`(${topCandidatesPerParty.length})`"></span></template>
            </h2>

            <div class="space-y-3">
                <template x-if="viewMode==='candidates'">
                    <template x-for="candidate in filteredCandidates" :key="candidate.partyId + '-' + candidate.id">
                        <div class="bg-white rounded-lg p-4 shadow-sm flex justify-between items-center border-l-4"
                            :style="`border-color: ${candidate.partyColor}`">
                            <div>
                                <div class="font-bold text-gray-900 text-lg" x-text="candidate.name"></div>
                                <div class="text-sm font-semibold text-gray-500" x-text="candidate.partyName"></div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black text-gray-800"
                                    x-text="candidate.votes.toLocaleString('de-DE')"></div>
                                <div class="text-xs text-gray-400">Stimmen</div>
                            </div>
                        </div>
                    </template>
                </template>

                <template x-if="viewMode==='mayor'">
                    <template x-for="candidate in topCandidatesPerParty" :key="candidate.partyId + '-' + candidate.id">
                        <div class="bg-white rounded-lg p-4 shadow-sm flex justify-between items-center border-l-4"
                            :style="`border-color: ${candidate.partyColor}`">
                            <div>
                                <div class="font-bold text-gray-900 text-lg" x-text="candidate.name"></div>
                                <div x-show="!isHighContrast" class="text-sm font-semibold text-gray-500"
                                    x-text="candidate.partyName"></div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black text-gray-800"
                                    x-text="candidate.votes.toLocaleString('de-DE')"></div>
                                <div :class="isHighContrast ? 'text-2xl font-black text-gray-800' : 'text-xs text-gray-400'"
                                    x-text="candidate.percent !== null ? candidate.percent + '\u202f%' : 'Stimmen'">
                                </div>
                            </div>
                        </div>
                    </template>
                </template>

                <div x-show="(viewMode==='candidates' && filteredCandidates.length === 0) || (viewMode==='mayor' && topCandidatesPerParty.length === 0)"
                    class="text-center py-8 text-gray-500">
                    <span x-text="emptyStateText"></span>
                </div>
            </div>
        </div>

    </main>

    <footer class="text-center py-4 text-xs text-gray-400">
        <a href="https://github.com/fredi-arand/kommunalwahl_2026_karlstadt" target="_blank" rel="noopener noreferrer"
            aria-label="GitHub Repository (opens in new tab)" class="hover:text-gray-600 underline">GitHub
            Repository</a>
    </footer>

    <script>
        const percentFormatter = new Intl.NumberFormat('de-DE', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        const standTimeFormatter = new Intl.DateTimeFormat('de-DE', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
        const historyDateTimeFormatter = new Intl.DateTimeFormat('de-DE', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });

        if (window.ChartDataLabels) {
            Chart.register(ChartDataLabels);
        }

        function electionDashboard() {
            return {
                parties: [],
                allCandidates: [],
                mayorCandidates: [],
                selectedParties: [],
                viewMode: 'mayor',
                filtersOpen: false,
                chartInstance: null,
                year: '2026',
                timestamp: null,
                countedAreas: '',
                mayorCountedAreas: '',
                councilCountedAreas: '',
                councilCandidatesAvailable: false,
                councilCsvAvailable: false,
                cacheKey: 'karlstadt-election-results-v1',
                actualUpdatesKey: 'karlstadt-election-actual-updates-v1',
                refreshStatus: '',
                latestPayloadSignature: null,
                actualUpdateTimestamps: [],
                showUpdateHistory: false,
                lastScrollY: 0,
                standRowVisible: true,
                isHighContrast: false,
                isDebugMode: false,

                async init() {
                    this.loadContrastFromUrl();
                    this.loadCachedData();
                    this.loadUpdateHistory();
                    await this.fetchData();
                    setInterval(() => this.fetchData(), 30000);
                    this.lastScrollY = window.scrollY || 0;
                    window.addEventListener('scroll', () => this.handleScrollUI(), { passive: true });
                },

                loadContrastFromUrl() {
                    const params = new URLSearchParams(window.location.search || '');
                    const rawValue = (params.get('contrast') || '').toLowerCase();
                    const rawDebug = (params.get('debug') || '').toLowerCase();
                    this.isHighContrast = rawValue === '1' || rawValue === 'true' || rawValue === 'on';
                    this.isDebugMode = rawDebug === '1' || rawDebug === 'true' || rawDebug === 'on';
                    this.applyContrastMode();
                },

                applyContrastMode() {
                    document.body.classList.toggle('high-contrast', this.isHighContrast);
                },

                handleScrollUI() {
                    const rawScrollY = window.scrollY || 0;
                    const doc = document.documentElement;
                    const maxScrollY = Math.max(0, doc.scrollHeight - window.innerHeight);

                    if (maxScrollY <= 8) {
                        this.standRowVisible = true;
                        this.lastScrollY = 0;
                        return;
                    }

                    const currentScrollY = Math.min(Math.max(rawScrollY, 0), maxScrollY);
                    const delta = currentScrollY - this.lastScrollY;
                    const scrolledDown = delta > 12;
                    const scrolledUp = delta < -8;

                    if (currentScrollY <= 8) {
                        this.standRowVisible = true;
                    } else if (scrolledDown) {
                        this.standRowVisible = false;
                        if (this.filtersOpen || this.showUpdateHistory) {
                            this.collapsePanels();
                        }
                    } else if (scrolledUp) {
                        this.standRowVisible = true;
                    }

                    this.lastScrollY = currentScrollY;
                },

                loadUpdateHistory() {
                    try {
                        const raw = localStorage.getItem(this.actualUpdatesKey);
                        if (!raw) return;
                        const parsed = JSON.parse(raw);
                        if (!Array.isArray(parsed)) return;
                        this.actualUpdateTimestamps = parsed.filter(item => typeof item === 'string');
                    } catch (e) {
                        // ignore cache issues
                    }
                },

                saveUpdateHistory() {
                    try {
                        localStorage.setItem(this.actualUpdatesKey, JSON.stringify(this.actualUpdateTimestamps));
                    } catch (error) {
                        console.warn('Could not persist update history in localStorage:', error);
                    }
                },

                recordActualUpdate() {
                    const updateTimestamp = historyDateTimeFormatter.format(new Date());
                    if (this.actualUpdateTimestamps[0] === updateTimestamp) return;
                    this.actualUpdateTimestamps = [
                        updateTimestamp,
                        ...this.actualUpdateTimestamps.filter(entry => entry !== updateTimestamp)
                    ].slice(0, 3);
                    this.saveUpdateHistory();
                },

                toggleUpdateHistory() {
                    const nextState = !this.showUpdateHistory;
                    this.showUpdateHistory = nextState;
                    if (nextState) {
                        this.filtersOpen = false;
                    }
                },

                toggleFilters() {
                    const nextState = !this.filtersOpen;
                    this.filtersOpen = nextState;
                    if (nextState) {
                        this.showUpdateHistory = false;
                    }
                },

                collapsePanels() {
                    this.filtersOpen = false;
                    this.showUpdateHistory = false;
                },

                payloadSignature(payload) {
                    const signaturePayload = {
                        year: payload?.year || null,
                        countedAreas: payload?.countedAreas || null,
                        mayorCountedAreas: payload?.mayorCountedAreas || null,
                        councilCountedAreas: payload?.councilCountedAreas || null,
                        mayor: Array.isArray(payload?.mayor) ? payload.mayor : [],
                        parties: Array.isArray(payload?.parties) ? payload.parties : [],
                        councilCandidatesAvailable: !!payload?.councilCandidatesAvailable,
                        councilCsvAvailable: !!payload?.councilCsvAvailable
                    };
                    return JSON.stringify(signaturePayload);
                },

                formatDisplayName(name) {
                    if (!name || typeof name !== 'string') return name;
                    const normalized = name.trim().replace(/\s+/g, ' ');
                    if (!normalized) return normalized;

                    if (normalized.includes(',')) {
                        const parts = normalized.split(',').map(part => part.trim()).filter(Boolean);
                        if (parts.length >= 2) {
                            return parts.slice(1).join(' ') + ' ' + parts[0];
                        }
                    }

                    const tokens = normalized.split(' ');
                    if (tokens.length < 2) return normalized;

                    return [...tokens.slice(1), tokens[0]].join(' ');
                },

                applyPayload(payload) {
                    this.year = payload.year || '2026';
                    document.title = 'Kommunalwahl Karlstadt ' + this.year;
                    this.countedAreas = typeof payload.countedAreas === 'string' ? payload.countedAreas : '';
                    this.mayorCountedAreas = typeof payload.mayorCountedAreas === 'string' ? payload.mayorCountedAreas : '';
                    this.councilCountedAreas = typeof payload.councilCountedAreas === 'string' ? payload.councilCountedAreas : '';

                    if (!this.timestamp && payload.timestamp) {
                        const ts = new Date(payload.timestamp);
                        if (!isNaN(ts.getTime())) {
                            this.timestamp = standTimeFormatter.format(ts);
                        }
                    }

                    this.councilCandidatesAvailable = !!payload.councilCandidatesAvailable;
                    this.councilCsvAvailable = !!payload.councilCsvAvailable;
                    this.parties = Array.isArray(payload.parties) ? payload.parties : [];
                    this.mayorCandidates = Array.isArray(payload.mayor) ? payload.mayor : [];

                    // Flatten candidates for the list view (exclude aggregated/Unknown group)
                    let tempCandidates = [];
                    this.parties.forEach(party => {
                        if (party.id === 'Unknown' || party.name === 'Unknown') return;
                        (party.candidates || []).forEach(candidate => {
                            tempCandidates.push({
                                ...candidate,
                                name: this.formatDisplayName(candidate.name),
                                partyId: party.id,
                                partyName: party.name,
                                partyColor: party.color
                            });
                        });
                    });

                    // Sort by votes descending
                    this.allCandidates = tempCandidates.sort((a, b) => b.votes - a.votes);

                    // Ensure selectedParties are still valid (keep empty selection if none)
                    const validIds = this.parties.map(p => p.id);
                    this.selectedParties = (this.selectedParties || []).filter(id => validIds.includes(id));

                    try {
                        this.updateChart();
                    } catch (error) {
                        console.warn('Chart update skipped due to runtime error:', error);
                    }
                },

                loadCachedData() {
                    try {
                        const raw = localStorage.getItem(this.cacheKey);
                        if (!raw) return;
                        const parsed = JSON.parse(raw);
                        if (!parsed || typeof parsed !== 'object') return;
                        this.latestPayloadSignature = this.payloadSignature(parsed);
                        this.applyPayload(parsed);
                    } catch (e) {
                        // ignore cache issues
                    }
                },

                async fetchData() {
                    try {
                        const apiUrls = ['/api/results'];
                        const isLocalHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                        if (window.location.protocol === 'file:' || isLocalHost) {
                            apiUrls.push('http://localhost:3000/api/results');
                        }

                        let response = null;
                        let lastError = null;
                        const attemptErrors = [];
                        for (const apiUrl of apiUrls) {
                            try {
                                const candidateResponse = await fetch(apiUrl);
                                if (!candidateResponse.ok) {
                                    throw new Error('API request failed with status ' + candidateResponse.status + ' for ' + apiUrl);
                                }
                                response = candidateResponse;
                                break;
                            } catch (error) {
                                lastError = error;
                                const message = error && error.message ? error.message : String(error);
                                attemptErrors.push({ apiUrl, message });
                            }
                        }

                        if (!response) {
                            console.error('API fetch attempts failed:', attemptErrors);
                            throw lastError || new Error('No API endpoint reachable');
                        }

                        const payload = await response.json();
                        const incomingSignature = this.payloadSignature(payload);
                        const contentChanged = this.latestPayloadSignature !== incomingSignature;
                        const usedStaleCache = !!payload.stale;

                        this.latestPayloadSignature = incomingSignature;
                        this.applyPayload(payload);
                        this.timestamp = standTimeFormatter.format(new Date());
                        try {
                            localStorage.setItem(this.cacheKey, JSON.stringify(payload));
                        } catch (error) {
                            console.warn('Could not persist refresh payload in localStorage:', error);
                        }

                        const nowText = new Date().toLocaleTimeString('de-DE');
                        if (usedStaleCache && this.timestamp) {
                            this.refreshStatus = 'Quelle kurz nicht erreichbar · zwischengespeicherte Daten (Stand: ' + this.timestamp + ') · zuletzt geprüft: ' + nowText;
                        } else if (usedStaleCache) {
                            this.refreshStatus = 'Quelle kurz nicht erreichbar · zwischengespeicherte Daten · zuletzt geprüft: ' + nowText;
                        } else if (contentChanged) {
                            this.recordActualUpdate();
                        } else {
                            this.refreshStatus = '';
                        }
                    } catch (error) {
                        console.error('Error fetching API data:', error);
                        this.refreshStatus = 'Aktualisierung fehlgeschlagen';
                    }
                },

                toggleParty(partyId) {
                    const idx = this.selectedParties.indexOf(partyId);
                    if (idx === -1) this.selectedParties.push(partyId);
                    else this.selectedParties.splice(idx, 1);
                },

                resetFilters() {
                    this.selectedParties = [];
                },

                get filteredCandidates() {
                    let filtered = this.allCandidates;

                    // Filter by selected parties (if any) - only when in Kandidaten view
                    if (this.viewMode === 'candidates' && this.selectedParties && this.selectedParties.length > 0) {
                        filtered = filtered.filter(c => this.selectedParties.includes(c.partyId));
                    }

                    return filtered;
                },

                get emptyStateText() {
                    if (this.viewMode === 'mayor') {
                        return 'Keine Bürgermeisterkandidaten gefunden.';
                    }
                    if (this.councilCandidatesAvailable) {
                        return 'Keine Stadtratskandidaten gefunden.';
                    }
                    if (this.councilCsvAvailable) {
                        return 'Stadtrats-CSV ist veröffentlicht, die Aufbereitung läuft noch.';
                    }
                    return 'Stadtrats-Ergebnisse sind noch nicht veröffentlicht.';
                },

                get displayCountedAreas() {
                    if (this.viewMode === 'candidates') {
                        return this.councilCountedAreas || this.countedAreas || '';
                    }
                    return this.mayorCountedAreas || this.countedAreas || this.councilCountedAreas || '';
                },

                get countedAreasSourceLabel() {
                    if (this.viewMode === 'candidates') {
                        if (this.councilCountedAreas) return 'Quelle: Stadtratswahl';
                        if (this.countedAreas) return 'Quelle: Bürgermeisterwahl (Fallback)';
                        return '';
                    }

                    if (this.mayorCountedAreas) return 'Quelle: Bürgermeisterwahl';
                    if (this.countedAreas) return 'Quelle: API-Fallback';
                    if (this.councilCountedAreas) return 'Quelle: Stadtratswahl (Fallback)';
                    return '';
                },

                get topCandidatesPerParty() {
                    // Prefer explicit mayor JSON if available
                    if (this.mayorCandidates && this.mayorCandidates.length > 0) {
                        const totalVotes = this.mayorCandidates.reduce((sum, c) => sum + (c.votes || 0), 0);
                        // Map mayor candidates to include party color if possible
                        return this.mayorCandidates.map(c => {
                            const party = this.parties.find(p => p.id === c.party || p.name === c.party) || {};
                            const votes = c.votes || 0;
                            return {
                                id: c.id,
                                name: this.formatDisplayName(c.name),
                                votes,
                                percent: totalVotes > 0 ? percentFormatter.format(votes / totalVotes * 100) : null,
                                partyId: c.party,
                                partyName: c.party,
                                partyColor: party.color || '#CCCCCC'
                            };
                        }).sort((a, b) => b.votes - a.votes);
                    }

                    const candidates = this.parties
                        .filter(p => p.id !== 'Unknown' && p.name !== 'Unknown')
                        .map(p => {
                            const sorted = (p.candidates || []).slice().sort((a, b) => b.votes - a.votes);
                            if (sorted.length === 0) return null;
                            const top = sorted[0];
                            return {
                                ...top,
                                name: this.formatDisplayName(top.name),
                                partyId: p.id,
                                partyName: p.name,
                                partyColor: p.color
                            };
                        }).filter(Boolean);

                    const totalVotes = candidates.reduce((sum, c) => sum + c.votes, 0);
                    return candidates
                        .map(c => ({ ...c, percent: totalVotes > 0 ? percentFormatter.format(c.votes / totalVotes * 100) : null }))
                        .sort((a, b) => b.votes - a.votes);
                },

                updateChart() {
                    const ctx = document.getElementById('partyChart');
                    if (!ctx) return;

                    const chartTextColor = this.isHighContrast ? '#ffffff' : '#374151';
                    const seatParties = this.parties.filter(p => (p.seats || 0) > 0);
                    const hasSeatData = seatParties.length > 0;
                    const activeParties = hasSeatData
                        ? seatParties
                        : this.parties.filter(p => p.totalVotesPercent > 0 || p.candidates.length > 0);

                    const labels = activeParties.map(p => p.name);
                    const data = hasSeatData
                        ? activeParties.map(p => p.seats || 0)
                        : activeParties.map(p => p.totalVotesPercent || 0);
                    const colors = activeParties.map(p => p.color);

                    const datalabelFormatter = function (value) {
                        if (value <= 0) return '';
                        return hasSeatData ? value : (percentFormatter.format(value) + '%');
                    };

                    if (this.chartInstance) {
                        this.chartInstance.data.labels = labels;
                        this.chartInstance.data.datasets[0].data = data;
                        this.chartInstance.data.datasets[0].label = hasSeatData ? 'Sitze' : 'Stimmen (%)';
                        this.chartInstance.data.datasets[0].backgroundColor = colors;
                        this.chartInstance.options.plugins.datalabels.color = chartTextColor;
                        this.chartInstance.options.plugins.datalabels.formatter = datalabelFormatter;
                        this.chartInstance.update();
                    } else {
                        this.chartInstance = new Chart(ctx, {
                            type: 'doughnut',
                            data: {
                                labels: labels,
                                datasets: [{
                                    label: 'Sitze',
                                    data: data,
                                    backgroundColor: colors,
                                    borderWidth: 0,
                                    hoverOffset: 2
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                rotation: -90,
                                circumference: 180,
                                cutout: '55%',
                                plugins: {
                                    legend: {
                                        display: true,
                                        position: 'bottom',
                                        labels: {
                                            color: chartTextColor,
                                            boxWidth: 10,
                                            usePointStyle: true,
                                        }
                                    },
                                    datalabels: {
                                        anchor: 'end',
                                        align: 'start',
                                        formatter: datalabelFormatter,
                                        font: { size: 10, weight: 'bold' },
                                        color: chartTextColor
                                    }
                                }
                            }
                        });
                    }
                }
            }
        }
    </script>
</body>

</html>
