<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karlstadt 2026 Live</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Neutral, high-contrast theme */
        body {
            background-color: #f3f4f6;
            color: #111827;
        }

        .touch-target {
            min-height: 44px;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
        }
    </style>
</head>

<body class="antialiased" x-data="electionDashboard()" x-init="init()">

    <!-- Sticky Header & Filter Bar -->
    <header class="sticky-header bg-white shadow-md p-4">
        <h1 class="text-xl font-bold text-center mb-3 text-gray-800">Kommunalwahl Karlstadt</h1>

        <div class="mb-3 relative">
            <div class="flex items-start gap-2">
                <input type="text" x-model="searchQuery" @keydown.enter.prevent="addSearchCandidateFilter()"
                    placeholder="🔎 Kandidat suchen..."
                    class="flex-1 border-2 border-gray-300 rounded-lg p-3 touch-target text-lg focus:outline-none focus:border-blue-500 transition">
                <button @click="addSearchCandidateFilter()" title="Als Filter hinzufügen"
                    class="ml-2 px-4 py-2 bg-blue-600 text-white rounded-lg touch-target">+</button>
            </div>

            <!-- Search suggestions -->
            <div x-show="searchQuery.trim() !== ''"
                class="mt-2 bg-white border rounded-lg shadow-sm max-h-64 overflow-auto">
                <template x-for="m in searchMatches" :key="m.partyId + '-' + m.id">
                    <div class="flex items-center justify-between px-3 py-2 hover:bg-gray-50">
                        <div>
                            <div class="font-medium" x-text="m.name"></div>
                            <div class="text-xs text-gray-500" x-text="m.partyName"></div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button @click="addCandidateFilter(m)"
                                class="px-3 py-1 bg-green-600 text-white rounded">+</button>
                        </div>
                    </div>
                </template>
                <div x-show="searchMatches.length === 0" class="p-3 text-sm text-gray-500">Keine Treffer</div>
            </div>
        </div>

        <!-- Selected candidate filter tags + reset -->
        <div class="mb-3 flex items-center gap-2 flex-wrap">
            <template x-for="c in candidateFilters" :key="c.partyId + '-' + c.id">
                <div class="px-3 py-1 rounded-full bg-gray-100 flex items-center gap-2 border">
                    <span class="font-medium" x-text="c.name"></span>
                    <button @click="removeCandidateFilter(c)" class="text-gray-500">✕</button>
                </div>
            </template>
            <button @click="resetFilters()" class="ml-auto px-3 py-1 rounded-lg bg-gray-200 text-sm">Filter
                zurücksetzen</button>
        </div>

        <!-- View mode toggles and Party Filter Toggle Buttons -->
        <div class="flex items-center justify-between mb-2">
            <div class="flex gap-2">
                <button @click="viewMode='candidates'"
                    :class="viewMode==='candidates'? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-700'"
                    class="touch-target px-4 py-2 rounded-full font-semibold border-2 transition">Kandidaten</button>
                <button @click="viewMode='parties'"
                    :class="viewMode==='parties'? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-700'"
                    class="touch-target px-4 py-2 rounded-full font-semibold border-2 transition">Parteien</button>
                <button @click="viewMode='mayor'"
                    :class="viewMode==='mayor'? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-700'"
                    class="touch-target px-4 py-2 rounded-full font-semibold border-2 transition">Bürgermeister</button>
            </div>

            <div x-show="viewMode==='candidates'" class="flex overflow-x-auto gap-2 pb-2 hide-scrollbar">
                <template x-for="party in parties" :key="party.id">
                    <button @click="toggleParty(party.id)"
                        class="touch-target px-4 py-2 rounded-full font-semibold border-2 transition whitespace-nowrap"
                        :class="selectedParties.includes(party.id) ? 'text-white' : 'bg-gray-100 text-gray-700 border-gray-300'"
                        :style="selectedParties.includes(party.id) ? `background-color: ${party.color}; border-color: ${party.color};` : ''"
                        x-text="party.name"></button>
                </template>
            </div>
        </div>
    </header>

    <main class="p-4">

        <!-- Party Strength Chart -->
        <div x-show="viewMode==='parties'" class="bg-white rounded-xl shadow-sm p-4 mb-6">
            <h2 class="text-lg font-bold mb-2 text-gray-700">Parteistimmen (%)</h2>
            <div class="w-full relative" style="height: 180px;">
                <canvas id="partyChart"></canvas>
            </div>
        </div>

        <!-- Candidates / Mayor Lists -->
        <div>
            <h2 class="text-lg font-bold mb-4 text-gray-700">
                <template x-if="viewMode==='candidates'">Kandidaten <span class="text-sm font-normal text-gray-500"
                        x-text="`(${filteredCandidates.length})`"></span></template>
                <template x-if="viewMode==='mayor'">Bürgermeisterkandidaten <span
                        class="text-sm font-normal text-gray-500"
                        x-text="`(${topCandidatesPerParty.length})`"></span></template>
            </h2>

            <div class="space-y-3">
                <template x-if="viewMode==='candidates'">
                    <template x-for="candidate in filteredCandidates" :key="candidate.partyId + '-' + candidate.id">
                        <div class="bg-white rounded-lg p-4 shadow-sm flex justify-between items-center border-l-4"
                            :style="`border-color: ${candidate.partyColor}`">
                            <div>
                                <div class="font-bold text-gray-900 text-lg" x-text="candidate.name"></div>
                                <div class="text-sm font-semibold text-gray-500" x-text="candidate.partyName"></div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black text-gray-800"
                                    x-text="candidate.votes.toLocaleString('de-DE')"></div>
                                <div class="text-xs text-gray-400">Stimmen</div>
                            </div>
                        </div>
                    </template>
                </template>

                <template x-if="viewMode==='mayor'">
                    <template x-for="candidate in topCandidatesPerParty" :key="candidate.partyId + '-' + candidate.id">
                        <div class="bg-white rounded-lg p-4 shadow-sm flex justify-between items-center border-l-4"
                            :style="`border-color: ${candidate.partyColor}`">
                            <div>
                                <div class="font-bold text-gray-900 text-lg" x-text="candidate.name"></div>
                                <div class="text-sm font-semibold text-gray-500" x-text="candidate.partyName"></div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black text-gray-800"
                                    x-text="candidate.votes.toLocaleString('de-DE')"></div>
                                <div class="text-xs text-gray-400">Stimmen</div>
                            </div>
                        </div>
                    </template>
                </template>

                <div x-show="(viewMode==='candidates' && filteredCandidates.length === 0) || (viewMode==='mayor' && topCandidatesPerParty.length === 0)"
                    class="text-center py-8 text-gray-500">
                    Keine Kandidaten gefunden.
                </div>
            </div>
        </div>

    </main>

    <script>
        function electionDashboard() {
            return {
                parties: [],
                allCandidates: [],
                mayorCandidates2020: [],
                searchQuery: '',
                selectedParties: [],
                candidateFilters: [],
                viewMode: 'candidates',
                chartInstance: null,

                async init() {
                    await this.fetchData();
                    // Poll every 10 seconds
                    setInterval(() => this.fetchData(), 10000);
                },

                async fetchData() {
                    try {
                        const response = await fetch('candidates_2020.json?t=' + new Date().getTime());
                        if (!response.ok) throw new Error('Network response was not ok');
                        const data = await response.json();

                        this.parties = data;

                        // Try to load mayor candidates JSON (optional)
                        try {
                            const mResp = await fetch('mayor_2020.json?t=' + new Date().getTime());
                            if (mResp.ok) {
                                this.mayorCandidates2020 = await mResp.json();
                            }
                        } catch (e) {
                            // ignore if file missing
                        }

                        // Flatten candidates for the list view (exclude aggregated/Unknown group)
                        let tempCandidates = [];
                        this.parties.forEach(party => {
                            if (party.id === 'Unknown' || party.name === 'Unknown') return;
                            party.candidates.forEach(candidate => {
                                tempCandidates.push({
                                    ...candidate,
                                    partyId: party.id,
                                    partyName: party.name,
                                    partyColor: party.color
                                });
                            });
                        });

                        // Sort by votes descending
                        this.allCandidates = tempCandidates.sort((a, b) => b.votes - a.votes);

                        // Ensure selectedParties are still valid (keep empty selection if none)
                        const validIds = this.parties.map(p => p.id);
                        this.selectedParties = (this.selectedParties || []).filter(id => validIds.includes(id));

                        this.updateChart();
                    } catch (error) {
                        console.error("Error fetching data:", error);
                    }
                },

                toggleParty(partyId) {
                    const idx = this.selectedParties.indexOf(partyId);
                    if (idx === -1) this.selectedParties.push(partyId);
                    else this.selectedParties.splice(idx, 1);
                },

                resetFilters() {
                    this.selectedParties = [];
                    this.candidateFilters = [];
                    this.searchQuery = '';
                },

                addSearchCandidateFilter() {
                    const q = this.searchQuery.trim().toLowerCase();
                    if (!q) return;
                    const match = this.searchMatches[0];
                    if (match) {
                        this.addCandidateFilter(match);
                        this.searchQuery = '';
                    }
                },

                addCandidateFilter(c) {
                    if (!c) return;
                    const exists = this.candidateFilters.some(f => f.id === c.id && f.partyId === c.partyId);
                    if (!exists) this.candidateFilters.push(c);
                },

                removeCandidateFilter(c) {
                    this.candidateFilters = this.candidateFilters.filter(f => !(f.id === c.id && f.partyId === c.partyId));
                },

                get filteredCandidates() {
                    // If specific candidates are selected as filters, show only them (for comparison)
                    if (this.candidateFilters.length > 0) {
                        return this.candidateFilters.slice().sort((a, b) => b.votes - a.votes);
                    }

                    let filtered = this.allCandidates;

                    // Filter by selected parties (if any) - only when in Kandidaten view
                    if (this.viewMode === 'candidates' && this.selectedParties && this.selectedParties.length > 0) {
                        filtered = filtered.filter(c => this.selectedParties.includes(c.partyId));
                    }

                    // Filter by search query (fuzzy match name)
                    if (this.searchQuery.trim() !== '') {
                        const query = this.searchQuery.toLowerCase();
                        filtered = filtered.filter(c => c.name.toLowerCase().includes(query));
                    }

                    return filtered;
                },

                get searchMatches() {
                    const q = this.searchQuery.trim().toLowerCase();
                    if (!q) return [];
                    return this.allCandidates.filter(c => c.name.toLowerCase().includes(q)).slice(0, 8);
                },

                get topCandidatesPerParty() {
                    // Prefer explicit mayor JSON if available
                    if (this.mayorCandidates2020 && this.mayorCandidates2020.length > 0) {
                        // Map mayor candidates to include party color if possible
                        return this.mayorCandidates2020.map(c => {
                            const party = this.parties.find(p => p.id === c.party || p.name === c.party) || {};
                            return {
                                id: c.id,
                                name: c.name,
                                votes: c.votes || 0,
                                partyId: c.party,
                                partyName: c.party,
                                partyColor: party.color || '#CCCCCC'
                            };
                        }).sort((a, b) => b.votes - a.votes);
                    }

                    return this.parties
                        .filter(p => p.id !== 'Unknown' && p.name !== 'Unknown')
                        .map(p => {
                            const sorted = (p.candidates || []).slice().sort((a, b) => b.votes - a.votes);
                            if (sorted.length === 0) return null;
                            const top = sorted[0];
                            return {
                                ...top,
                                partyId: p.id,
                                partyName: p.name,
                                partyColor: p.color
                            };
                        }).filter(Boolean).sort((a, b) => b.votes - a.votes);
                },

                updateChart() {
                    const ctx = document.getElementById('partyChart');
                    if (!ctx) return;

                    // Exclude parties with 0 candidates and 0 votes just in case
                    const activeParties = this.parties.filter(p => p.totalVotesPercent > 0 || p.candidates.length > 0);

                    const labels = activeParties.map(p => p.name);
                    const data = activeParties.map(p => p.totalVotesPercent);
                    const colors = activeParties.map(p => p.color);

                    if (this.chartInstance) {
                        this.chartInstance.data.labels = labels;
                        this.chartInstance.data.datasets[0].data = data;
                        this.chartInstance.data.datasets[0].backgroundColor = colors;
                        this.chartInstance.update();
                    } else {
                        this.chartInstance = new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: labels,
                                datasets: [{
                                    label: 'Stimmen (%)',
                                    data: data,
                                    backgroundColor: colors,
                                    borderRadius: 4
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                indexAxis: 'x',
                                plugins: {
                                    legend: { display: false }
                                },
                                scales: {
                                    y: {
                                        beginAtZero: true,
                                        ticks: {
                                            callback: function (value) {
                                                return value + '%';
                                            }
                                        }
                                    }
                                }
                            }
                        });
                    }
                }
            }
        }
    </script>
</body>

</html>
